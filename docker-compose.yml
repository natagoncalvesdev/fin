services:
  db:
    image: postgres:16-alpine
    container_name: fin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fin
      POSTGRES_PASSWORD: fin
      POSTGRES_DB: fin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin -d fin"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fin-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fin:fin@db:5432/fin
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: https://fin.natdev.com.br,http://localhost:8000,http://127.0.0.1:8000
      N8N_WEBHOOK_RELATORIO_URL: https://n8n.natdev.com.br/webhook/relatorio-fin
      # URL interna: container -> host (evita falha de rede com o domínio público)
      N8N_WEBHOOK_RELATORIO_URL_INTERNAL: http://host.docker.internal/webhook/relatorio-fin
      N8N_WEBHOOK_HOST_HEADER: n8n.natdev.com.br
      # Se o n8n expõe a porta 5678 direto no host, use em vez das duas linhas acima:
      # N8N_WEBHOOK_RELATORIO_URL_INTERNAL: http://host.docker.internal:5678/webhook/relatorio-fin
      # N8N_WEBHOOK_HOST_HEADER:

volumes:
  postgres_data:
