<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Controle</title>
  <link rel="icon" href="img/icone.ico" type="image/x-icon" />
  <link rel="stylesheet" href="sidebar.css?v=4">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/mobile-shell.css">
  <script src="js/fin-sdk.js"></script>
  <script src="sidebar.js?v=4"></script>
  <style>
    :root {
      --bg-main: #F8FAFC;
      --bg-section: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #64748B;
      --border-color: #E2E8F0;
      --sidebar-bg: #0F172A;
      --sidebar-text: #F8FAFC;
      --sidebar-item-bg: rgba(255, 255, 255, 0.08);
      --sidebar-item-hover: rgba(255, 255, 255, 0.14);
      --accent-blue: #10B981;
      --accent-blue-hover: #059669;
      --accent-green: #10B981;
      --accent-red: #EF4444;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -1px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -2px rgba(15, 23, 42, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 10px 10px -5px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F8FAFC;
      display: flex;
      min-height: 100vh;
      margin: 0;
      color: var(--text-primary);
    }

    .content {
      flex: 1;
      padding: 40px;
      margin-left: 280px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section {
      background: var(--bg-section);
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .welcome-card { text-align: center; padding: 40px 20px; }
    .welcome-card h2 {
      margin-top: 0;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #0F172A 0%, #10B981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome-card p {
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 500px;
      margin: 10px auto 30px;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .quick-links a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 16px;
      background: #10B981;
      color: #fff;
      text-decoration: none;
      padding: 24px 20px;
      min-height: 140px;
      box-shadow: var(--shadow-md);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .quick-links a:hover { transform: translateY(-4px); background: #059669; }
    .quick-links a strong {
      display: block;
      width: 100%;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.3;
    }
    .quick-links a span {
      display: block;
      width: 100%;
      font-size: 14px;
      opacity: 0.9;
      text-align: center;
      line-height: 1.4;
    }

    .quick-link-button {
      padding: 15px 30px;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: var(--accent-red);
      box-shadow: var(--shadow-md);
    }

    @media (max-width: 768px) {
      .content {
        margin-left: 0;
        padding: 24px 16px 16px;
      }

      .quick-links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <main class="content">
    <div class="section welcome-card">
      <h2 id="welcome-message">Bem vindo!</h2>
      <p>Selecione uma das opções abaixo para começar a gerenciar suas finanças e veículos.</p>
    </div>

    <div class="quick-links">
      <a href="financeiro.html?tab=mes" id="linkFinanceiroHome">
        <strong>Controle Financeiro</strong>
        <span>Gerencie suas contas, despesas e receitas.</span>
      </a>
      <a href="veiculos.html">
        <strong>Controle de Veículos</strong>
        <span>Registre abastecimentos e monitore seus veículos.</span>
      </a>
      <a href="relatorio.html">
        <strong>Relatório</strong>
        <span>Visualize relatórios e gráficos por categoria.</span>
      </a>
    </div>

    <div style="margin-top: auto; padding-top: 20px; text-align: center;">
      <button id="logout-button-home" class="quick-link-button">Sair</button>
    </div>
  </main>

  <script src="js/mobile-nav.js?v=7"></script>
  <script>
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById('linkFinanceiroHome')?.addEventListener('click', () => {
      try { sessionStorage.setItem('finNavPermitido', '1'); } catch (e) { /* ignore */ }
    });

    function extrairPrimeiroNome(nome) {
      const limpo = String(nome || '').trim();
      if (!limpo) return 'Usuário';
      if (limpo.includes('@')) return limpo.split('@')[0];
      return limpo.split(/\s+/)[0];
    }

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      db.collection('users').doc(user.uid).get().then(doc => {
        const nome = doc.exists
          ? (doc.data().name || user.displayName || user.email || 'Usuário')
          : (user.displayName || user.email || 'Usuário');
        const primeiroNome = extrairPrimeiroNome(nome);
        document.getElementById('welcome-message').textContent = `Bem vindo, ${primeiroNome}!`;
      });
    });

    document.getElementById('logout-button-home').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = 'login.html');
    });
  </script>
</body>
</html>
