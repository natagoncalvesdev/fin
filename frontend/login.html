<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Controle Financeiro</title>
  <link rel="icon" href="img/icone.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/theme.css?v=3" />
  <script src="js/fin-run-once.js"></script>
  <script src="js/fin-sdk.js?v=2"></script>
</head>
<body class="auth-page">
  <div class="auth-shell">
    <img src="img/logo.png" alt="Controle" class="auth-logo" />
    <div class="auth-container">
    <h1>Bem-vindo!</h1>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn-add">Entrar</button>
    </form>
    <p id="error-message" class="auth-error"></p>
    <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
    </div>
  </div>

  <script>
    const auth = firebase.auth();

    const loginForm = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      finRunOnce(submitBtn, async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        errorMessage.style.display = 'none';
        try {
          await auth.signInWithEmailAndPassword(email, password);
          window.location.href = 'index.html';
        } catch (error) {
          errorMessage.textContent = 'Email ou senha inválidos. Tente novamente.';
          errorMessage.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
